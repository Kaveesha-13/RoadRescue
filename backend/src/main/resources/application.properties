spring.application.name=backend
# Server Port (Spring Boot will run on localhost:8080)
server.port=8080

# MySQL Database Connection (XAMPP default)
spring.datasource.url=jdbc:mysql://localhost:3306/road_rescue?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Settings (Shows SQL queries in the console for debugging)
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
