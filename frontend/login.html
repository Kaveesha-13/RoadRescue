<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RoadRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #121212;
    background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.5)), url('assets/background.jpeg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
    min-height: 100vh;
    
    
    display: flex;
    align-items: center;
    justify-content: center;
}


.bg-image {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box; 
}
        .auth-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px; 
            color: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .app-logo {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #00d2ff;
            margin-bottom: 20px;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 8px;
            padding: 12px;
        }
        .form-control:focus {
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }
        .btn-custom-primary {
            background: linear-gradient(45deg, #0072ff, #00d2ff);
            color: white;
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn-custom-primary:hover {
            transform: translateY(-2px);
            color: white;
        }
    </style>
</head>
<body>
    <div class="bg-image">
        <div class="auth-card text-center animate__animated animate__fadeIn">
            <img src="assets/logo.jpeg" alt="RoadRescue Logo" class="app-logo">
            <h3 class="mb-4 fw-bold">Welcome Back</h3>
            
            <div id="errorMessage" class="alert alert-danger d-none text-start small" role="alert"></div>

            <form id="loginForm">
                <div class="mb-3 text-start">
                    <label class="form-label small text-light opacity-75">Username</label>
                    <input type="text" class="form-control" id="username" required placeholder="Enter your username">
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label small text-light opacity-75">Password</label>
                    <input type="password" class="form-control" id="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-custom-primary mb-3">Login Securely</button>
            </form>
            
            <div class="small mt-3">
                <span class="text-light opacity-75">Don't have an account?</span> 
                <a href="register.html" class="text-info text-decoration-none fw-bold">Sign up here</a>
            </div>
            <div class="small mt-2">
                <a href="index.html" class="text-light text-decoration-none opacity-50">← Back to Home</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault(); 
            
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const errorBox = document.getElementById('errorMessage');
            
            
            errorBox.classList.add('d-none');

            try {
                // Send data to Java Backend
                const response = await fetch('http://localhost:8080/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                if (response.ok) {
                    const userData = await response.json();
                    
                    
                    localStorage.setItem('roadRescueUser', JSON.stringify(userData));

                    // Route user to correct dashboard based on their role
                    if (userData.role === 'ADMIN') {
                        window.location.href = 'admin.html';
                    } else if (userData.role === 'VEHICLE_OWNER') {
                        window.location.href = 'owner.html';
                    } else if (userData.role === 'SERVICE_PROVIDER') {
                        window.location.href = 'provider.html';
                    }
                } else {
                    // Backend rejected login
                    const errorText = await response.text();
                    errorBox.textContent = errorText;
                    errorBox.classList.remove('d-none');
                }
            } catch (error) {
                // Server is down or unreachable
                errorBox.textContent = "Cannot connect to server. Ensure Java backend is running.";
                errorBox.classList.remove('d-none');
            }
        });
    </script>
     </body>
</html>
