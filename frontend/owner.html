<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard - RoadRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
       body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.5)), url('assets/background.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
        }
        .navbar-custom {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .navbar-brand img {
            width: 40px; height: 40px; border-radius: 50%; border: 2px solid #00d2ff; margin-right: 10px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            color: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.9);
            border: none; border-radius: 8px;
        }
        #map {
            height: 300px;
            border-radius: 10px;
            border: 2px solid #00d2ff;
        }
       .table-custom { 
    color: white !important; 
}
.table-custom th, .table-custom td { 
    color: white !important; 
    background: transparent !important; 
    border-bottom: 1px solid rgba(255, 255, 255, 0.2); 
}
    </style>
</head>
<body>

   

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top p-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
                <img src="assets/logo.jpeg" alt="Logo">
                RoadRescue <span class="text-info ms-2 fs-6 fw-normal">| Driver Portal</span>
            </a>
            <button class="btn btn-outline-danger btn-sm px-4 fw-bold rounded-pill" onclick="logout()">Log Out</button>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="glass-card mb-4">
            <h4 id="welcomeMessage" class="fw-bold mb-1">Welcome</h4>
            <p class="text-light opacity-75 small mb-0">Manage your vehicles and request emergency assistance.</p>
        </div>

        <div class="row">
            <div class="col-lg-5">
                <div class="glass-card">
                    <h5 class="text-info fw-bold border-bottom border-secondary pb-2">1. Add Vehicle to Garage</h5>
                    <form id="addVehicleForm" class="mt-3">
                        <input type="text" id="vehMake" class="form-control mb-2" placeholder="Make & Model (e.g., Toyota Camry)" required>
                        <input type="text" id="vehPlate" class="form-control mb-2" placeholder="License Plate" required>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Register Vehicle</button>
                    </form>
                </div>

                <div class="glass-card">
                    <h5 class="text-info fw-bold border-bottom border-secondary pb-2">2. Search For Help</h5>
                    <div class="mt-3">
                                <select id="serviceSearchDropdown" class="form-select">
                <option value="Towing">Towing</option>
                <option value="Mechanical">Mechanical Breakdown</option>
                <option value="Tire">Flat Tire / Puncture</option>
                <option value="Battery">Dead Battery / Jump Start</option>
                <option value="Fuel">Fuel Delivery</option>
                <option value="EV">EV Out of Charge</option>
            </select>
                        <button class="btn btn-info w-100 fw-bold text-dark" onclick="searchShops()">Find Nearby Providers</button>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="glass-card">
                    <h5 class="text-info fw-bold border-bottom border-secondary pb-2">3. Request Dispatch</h5>
                    
                   <p class="small text-light mt-2 mb-1">Tap the map or use your device GPS:</p>
<button class="btn btn-sm btn-outline-info w-100 mb-2 rounded-pill fw-bold" onclick="useDeviceLocation()">📍 Get My Current Location</button>
<div id="map" class="mb-3"></div>
                    <span id="coordDisplay" class="small text-warning">Location not set. Tap the map!</span>

                    <form id="requestForm" class="mt-3">
                        <div class="row g-2 mb-2">
                            <div class="col-6">
                                <select id="selectVehicle" class="form-select" required>
                                    <option value="" disabled selected>Select your vehicle...</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <select id="selectShop" class="form-select" required>
                                    <option value="" disabled selected>Search providers first...</option>
                                </select>
                            </div>
                        </div>
                        <textarea id="issueDesc" class="form-control mb-3" rows="2" placeholder="Describe the issue briefly..." required></textarea>
                        <button type="submit" class="btn btn-danger w-100 fw-bold rounded-pill">SEND EMERGENCY REQUEST</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="glass-card mt-2">
            <h5 class="text-info fw-bold border-bottom border-secondary pb-2">My Assistance History</h5>
            <div class="table-responsive mt-3">
                <table class="table table-custom">
                    <thead>
                        <tr>
                           <th>Provider Phone</th>
                            <th>Status</th>
                            <th>Description</th>
                            <th>Shop</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    </body>
</html>
