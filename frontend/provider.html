<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Dashboard - RoadRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
       body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            /* Note: I kept the 0.3 and 0.5 opacity here so it matches your owner page perfectly! */
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.5)), url('assets/background.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
        }
        .navbar-custom {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .navbar-brand img {
            width: 40px; height: 40px; border-radius: 50%; border: 2px solid #00d2ff; margin-right: 10px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            color: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.9);
            border: none; border-radius: 8px;
        }
        .table-custom { 
    color: white !important; 
}
.table-custom th, .table-custom td { 
    color: white !important; 
    background: transparent !important; 
    border-bottom: 1px solid rgba(255, 255, 255, 0.2); 
}
    </style>
</head>
<body>

    

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top p-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
                <img src="assets/logo.jpeg" alt="Logo">
                RoadRescue <span class="text-warning ms-2 fs-6 fw-normal">| Provider Portal</span>
            </a>
            <button class="btn btn-outline-danger btn-sm px-4 fw-bold rounded-pill" onclick="logout()">Log Out</button>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="glass-card mb-4">
            <h4 id="welcomeMessage" class="fw-bold mb-1">Welcome, Provider</h4>
            <p class="text-light opacity-75 small mb-0">Register your workshop locations and manage incoming roadside requests.</p>
        </div>

        <div class="row">
            <div class="col-lg-4">
                <div class="glass-card">
                    <h5 class="text-warning fw-bold border-bottom border-secondary pb-2">1. Add New Workshop</h5>
                    <form id="addShopForm" class="mt-3">
                <input type="text" id="shopName" class="form-control mb-2" placeholder="Workshop Name" required>
                
                <input type="text" id="businessRegNumber" class="form-control mb-2" placeholder="Business Reg Number" required>
                
                            <select id="shopServiceType" class="form-select mb-2" required>
                    <option value="" disabled selected>Select Primary Service...</option>
                    <option value="Towing">Towing</option>
                    <option value="Mechanical">Mechanical Breakdown</option>
                    <option value="Tire">Flat Tire</option>
                    <option value="Battery">Jump Start / Battery</option>
                    <option value="Fuel">Fuel Delivery</option>
                    <option value="EV">EV Charging</option>
                </select>
                
                <div class="input-group mb-3">
                    <button type="button" class="btn btn-outline-info" onclick="getLocation()">📍 Get Location</button>
                    <input type="text" id="latitude" class="form-control bg-light" placeholder="Latitude" readonly required>
                    <input type="text" id="longitude" class="form-control bg-light" placeholder="Longitude" readonly required>
                </div>

                <button type="submit" class="btn btn-warning w-100 fw-bold">Register Business</button>
            </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="glass-card">
                    <h5 class="text-warning fw-bold border-bottom border-secondary pb-2">2. Incoming Emergency Jobs</h5>
                    
                    <div class="mt-2 mb-3">
                        <label class="small text-light opacity-75">Select Workshop to view its queue:</label>
                        <select id="myShopsSelect" class="form-select w-50" onchange="loadJobQueue()">
                            <option value="" disabled selected>Loading your shops...</option>
                        </select>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-custom table-hover">
                            <thead>
                                <tr>
                                    <th>Customer Phone</th>
                                    <th>Customer Issue</th>
                                    <th>Status</th>
                                    <th>Coordinates</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="jobQueueBody">
                                <tr><td colspan="5" class="text-center opacity-50">Please select a workshop from the dropdown above.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', () => {
            const userData = localStorage.getItem('roadRescueUser');
            if (!userData) { window.location.href = 'login.html'; return; }
            
            currentUser = JSON.parse(userData);
            if (currentUser.role !== 'SERVICE_PROVIDER') {
                window.location.href = 'login.html'; return;
            }

            document.getElementById('welcomeMessage').textContent = `Welcome, ${currentUser.username}`;
            loadMyShops();
        });

        function logout() {
            localStorage.removeItem('roadRescueUser');
            window.location.href = 'index.html';
        }
        // Grab GPS coordinates from the browser
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                document.getElementById('latitude').value = position.coords.latitude;
                document.getElementById('longitude').value = position.coords.longitude;
            },
            (error) => {
                alert("Could not get location. Please allow location permissions in your browser pop-up.");
            }
        );
    } else {
        alert("Geolocation is not supported by this browser.");
    }
}

    // Add a new shop 
document.getElementById('addShopForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    
    const newShopData = {
        businessName: document.getElementById('shopName').value,
        businessRegNumber: document.getElementById('businessRegNumber').value,
        serviceType: document.getElementById('shopServiceType').value,
        latitude: parseFloat(document.getElementById('latitude').value),
        longitude: parseFloat(document.getElementById('longitude').value)
    };
    
    try {
        const res = await fetch(`http://localhost:8080/api/shops/add?providerId=${currentUser.id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
        
            body: JSON.stringify(newShopData)
        });
        if(res.ok) {
            alert('Workshop successfully registered!');
            document.getElementById('addShopForm').reset();
            loadMyShops(); 
        } else {
            const errorText = await res.text();
            alert(`Failed to add workshop: ${errorText}`);
        }
    } catch (err) { 
        console.error(err);
        alert('Server error: Could not connect to backend.'); 
    }
});

// Load Shops into dropdown
async function loadMyShops() {
    const select = document.getElementById('myShopsSelect');
    try {
        const res = await fetch(`http://localhost:8080/api/shops/provider/${currentUser.id}`);
        if (res.ok) {
            const shops = await res.json();
            
            if(shops.length === 0) {
                select.innerHTML = '<option value="" disabled selected>No workshops registered yet.</option>';
                return;
            }

            select.innerHTML = '<option value="" disabled selected>Select a workshop...</option>';
            shops.forEach(shop => {
                select.innerHTML += `<option value="${shop.id}">${shop.businessName} (${shop.serviceType})</option>`;
            });
        } else {
            select.innerHTML = '<option value="" disabled selected>Error: Backend rejected request.</option>';
        }
    } catch(e) {
        console.error(e);
        select.innerHTML = '<option value="" disabled selected>Error: Cannot connect to server.</option>';
    }
}

        // Load jobs for the selected shop
        async function loadJobQueue() {
            const shopId = document.getElementById('myShopsSelect').value;
            const tbody = document.getElementById('jobQueueBody');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center">Loading jobs...</td></tr>';

            try {
                const res = await fetch(`http://localhost:8080/api/bookings/shop/${shopId}`);
                if (res.ok) {
                    const jobs = await res.json();
                    tbody.innerHTML = '';
                    
                    if(jobs.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-success">No pending emergencies for this shop!</td></tr>';
                        return;
                    }

                    jobs.forEach(job => {
                        let badgeColor = job.status === 'PENDING' ? 'warning text-dark' : job.status === 'ACCEPTED' ? 'info text-dark' : job.status === 'COMPLETED' ? 'success' : 'danger';
                        
                       
                        let actionButtons = '';
                        if (job.status === 'PENDING') {
                            actionButtons = `
                                <button class="btn btn-success btn-sm me-1" onclick="updateJobStatus(${job.id}, 'ACCEPTED')">Accept</button>
                                <button class="btn btn-danger btn-sm" onclick="updateJobStatus(${job.id}, 'REJECTED')">Reject</button>
                            `;
                        } else if (job.status === 'ACCEPTED') {
                            actionButtons = `<button class="btn btn-primary btn-sm" onclick="updateJobStatus(${job.id}, 'COMPLETED')">Mark Completed</button>`;
                        } else {
                            actionButtons = `<span class="opacity-50 text-white">Done</span>`;
                        }

                        tbody.innerHTML += `
                            <tr>
                               <td>${job.owner && job.owner.phone ? job.owner.phone : 'N/A'}</td>
                                <td>${job.issueDescription}</td>
                                <td><span class="badge bg-${badgeColor}">${job.status}</span></td>
                                <td><a href="https://www.google.com/maps/search/?api=1&query=${job.customerLatitude},${job.customerLongitude}" target="_blank" class="text-info">View Map</a></td>
                                <td>${actionButtons}</td>
                            </tr>
                        `;
                    });
                }
            } catch(e) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">Server connection failed.</td></tr>';
            }
        }

        // Update Job Status
        async function updateJobStatus(bookingId, status) {
            if(!confirm(`Are you sure you want to ${status} this job?`)) return;

            try {
                const res = await fetch(`http://localhost:8080/api/bookings/${bookingId}/status?status=${status}`, {
                    method: 'PUT'
                });
                if(res.ok) {
                    alert(`Job ${status} successfully!`);
                    loadJobQueue(); // Refresh table
                } else alert('Error updating status');
            } catch(e) { alert('Server error'); }
        }
    </script>
</body>
</html>
